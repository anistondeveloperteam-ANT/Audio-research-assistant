[pytest]
testpaths = tests
python_files = test_*.py
# -p no:deepeval: don't auto-load DeepEval's pytest plugin during the normal suite, so
# offline runs stay fast and send no telemetry. tests/test_llm_quality.py imports deepeval
# itself (only when DEEPEVAL_ENABLED=true), so its opt-in gates are unaffected.
addopts = -q -p no:deepeval
