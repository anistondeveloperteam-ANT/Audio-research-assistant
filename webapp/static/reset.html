<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Research Assistant — Reset password</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2' stroke-linecap='round'%3E%3Crect x='4' y='10' width='16' height='11' rx='2'/%3E%3Cpath d='M8 10V7a4 4 0 0 1 8 0v3'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="/static/auth.css?v=1" />
</head>
<body>
  <div id="gradient"></div>
  <canvas id="network"></canvas>
  <div id="three"></div>

  <div class="top-bar">
    <div class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </div>
  </div>

  <div class="stage">
    <div class="card" id="card">
      <div class="brand-row">
        <div class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        </div>
        <h1>Reset password</h1>
      </div>
      <p class="tag">Choose a new password — at least 6 characters.</p>

      <form id="form" autocomplete="off" novalidate>
        <div class="field has-peek">
          <input type="password" id="pw" placeholder=" " autocomplete="new-password" autofocus />
          <label for="pw">New password</label>
          <button type="button" class="peek" data-peek="pw" tabindex="-1" aria-label="Show password">
            <svg class="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 3l18 18M10.6 10.7a3 3 0 0 0 4.2 4.2"/><path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.4 0 10 7 10 7a17 17 0 0 1-3.4 4.1M6.5 6.6A17 17 0 0 0 2 12s3.6 7 10 7c1 0 2-.1 2.9-.4"/></svg>
          </button>
        </div>
        <div class="bar"><i id="bar"></i></div>
        <div class="field has-peek">
          <input type="password" id="pw2" placeholder=" " autocomplete="new-password" />
          <label for="pw2">Confirm password</label>
          <button type="button" class="peek" data-peek="pw2" tabindex="-1" aria-label="Show password">
            <svg class="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 3l18 18M10.6 10.7a3 3 0 0 0 4.2 4.2"/><path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.4 0 10 7 10 7a17 17 0 0 1-3.4 4.1M6.5 6.6A17 17 0 0 0 2 12s3.6 7 10 7c1 0 2-.1 2.9-.4"/></svg>
          </button>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="label">Update password</span>
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          <span class="spinner"></span>
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><path d="M20 6L9 17l-5-5"/></svg>
        </button>

        <div class="msg" id="msg"></div>
      </form>

      <p class="foot"><a href="/login">← Back to sign in</a></p>
    </div>
  </div>

  <div class="hint">Secured workspace · End-to-end on your own infrastructure</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/static/auth-bg.js?v=1"></script>
<script>
const $ = (s) => document.querySelector(s);
const token = new URLSearchParams(location.search).get("token") || "";
const form = $("#form"), card = $("#card"), btn = $("#submitBtn"), msg = $("#msg");
const pw = $("#pw"), pw2 = $("#pw2"), bar = $("#bar");

function showMsg(html, ok) { msg.innerHTML = html; msg.className = "msg show" + (ok ? "" : " err"); }

pw.addEventListener("input", () => {
  const v = pw.value; let s = 0;
  if (v.length >= 6) s++; if (v.length >= 10) s++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++; if (/[0-9\W]/.test(v)) s++;
  bar.style.width = ([0, 25, 50, 80, 100][s] || 0) + "%";
});

document.querySelectorAll(".peek").forEach((b) => b.addEventListener("click", () => {
  const inp = document.getElementById(b.dataset.peek), show = inp.type === "password";
  inp.type = show ? "text" : "password";
  b.classList.toggle("on", show);
  b.setAttribute("aria-label", show ? "Hide password" : "Show password");
  inp.focus();
}));

if (!token) showMsg("This reset link is missing its token. Request a new one from the sign-in page.");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (btn.classList.contains("loading") || btn.classList.contains("done")) return;
  const a = pw.value, b = pw2.value;
  if (a.length < 6) { showMsg("Password must be at least 6 characters."); return; }
  if (a !== b) { showMsg("The two passwords don't match."); return; }
  if (!token) { showMsg("Missing reset token."); return; }
  btn.classList.add("loading"); btn.disabled = true; card.classList.add("authing");
  try {
    const res = await fetch("/api/reset-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: token, password: a }) });
    const d = await res.json().catch(() => ({}));
    if (res.ok && d.ok) {
      btn.classList.remove("loading"); btn.classList.add("done");
      showMsg("Password updated. Redirecting to sign in…", true);
      setTimeout(() => { location.href = "/login"; }, 1300); return;
    }
    btn.classList.remove("loading"); btn.disabled = false; card.classList.remove("authing");
    showMsg(d.error || "Couldn't reset your password. Please try again.");
  } catch (_) {
    btn.classList.remove("loading"); btn.disabled = false; card.classList.remove("authing");
    showMsg("Network error — please try again.");
  }
});
</script>
</body>
</html>
