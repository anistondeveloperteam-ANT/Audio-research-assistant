<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sign in · Research Assistant</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='2.2' stroke-linecap='round'%3E%3Ccircle cx='11' cy='11' r='7'/%3E%3Cpath d='M21 21l-4.3-4.3'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ---------- theme tokens (dark = :root, light flips on html.light) ---------- */
  :root{
    --bg0:#08090c; --bg1:#13151b;
    --card-bg:rgba(18,20,26,.55); --card-brd:rgba(255,255,255,.12);
    --text:#f3f4f6; --muted:#9aa0aa; --input-bg:rgba(255,255,255,.05);
    --ring:rgba(255,255,255,.65);
    --ok:#22c55e; --err:#fb7185;
    color-scheme:dark;
  }
  html.light{
    --bg0:#eef1f6; --bg1:#dde2ec;
    --card-bg:rgba(255,255,255,.62); --card-brd:rgba(15,20,30,.10);
    --text:#14181e; --muted:#5b626d; --input-bg:rgba(10,15,25,.04);
    --ring:rgba(20,30,45,.45);
    --ok:#16a34a; --err:#e11d48;
    color-scheme:light;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg0); color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    font-feature-settings:"cv05","ss01"; letter-spacing:-.006em;
    -webkit-font-smoothing:antialiased; overflow:hidden;
    display:grid; place-items:center;
  }
  .sr-only{position:absolute;width:1px;height:1px;clip:rect(0 0 0 0);overflow:hidden}
  .hidden{display:none !important}

  /* ---------- sober static background ---------- */
  #bg{position:fixed;inset:0;z-index:0;
    background:radial-gradient(130% 130% at 25% 12%,var(--bg1),var(--bg0) 58%)}
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 120% at 50% 38%,transparent 46%,rgba(0,0,0,.34) 100%)}
  html.light .vignette{background:radial-gradient(120% 120% at 50% 38%,transparent 52%,rgba(20,30,45,.10) 100%)}

  /* ---------- theme toggle ---------- */
  .theme{position:fixed;top:16px;right:16px;z-index:4;width:40px;height:40px;border-radius:50%;
    border:1px solid var(--card-brd);background:var(--card-bg);color:var(--text);cursor:pointer;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:grid;place-items:center;transition:border-color .2s}
  .theme:hover{border-color:var(--ring)}

  /* ---------- the card ---------- */
  .card{
    position:relative;z-index:3;width:372px;max-width:calc(100vw - 32px);
    padding:30px 28px 24px;border-radius:22px;
    background:var(--card-bg);border:1px solid var(--card-brd);
    backdrop-filter:blur(22px) saturate(1.25);-webkit-backdrop-filter:blur(22px) saturate(1.25);
    box-shadow:0 35px 80px -25px rgba(0,0,0,.62),inset 0 1px 0 rgba(255,255,255,.10);
    transition:transform .15s ease, box-shadow .35s ease;transform-style:preserve-3d;
  }
  .card.authing{box-shadow:0 35px 80px -25px rgba(0,0,0,.62),inset 0 1px 0 rgba(255,255,255,.10),0 0 0 1px var(--ring),0 0 40px -6px var(--ring)}

  .brand{display:flex;align-items:center;gap:11px;margin-bottom:4px}
  .logomark{width:34px;height:34px;flex:none;border-radius:11px;display:grid;place-items:center;
    background:var(--input-bg);border:1px solid var(--card-brd);color:var(--text);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10)}
  .logomark svg{width:18px;height:18px}
  .brand h1{font-size:18px;font-weight:650;margin:0;letter-spacing:-.022em;line-height:1.1}
  .sub{margin:9px 0 20px;color:var(--muted);font-size:13px;line-height:1.5}

  /* ---------- floating-label glass fields ---------- */
  .field{position:relative;margin-top:12px}
  .field input{
    width:100%;height:52px;padding:18px 14px 6px;font-size:15px;color:var(--text);
    background:var(--input-bg);border:1px solid var(--card-brd);border-radius:13px;outline:none;
    transition:border-color .18s,box-shadow .18s;
  }
  .field.has-peek input{padding-right:46px}
  .field input:focus{border-color:var(--ring);box-shadow:0 0 0 3px color-mix(in srgb,var(--ring) 16%,transparent)}
  .field label{position:absolute;left:14px;top:16px;color:var(--muted);font-size:15px;
    pointer-events:none;transition:top .15s ease,font-size .15s ease,letter-spacing .15s ease}
  .field input:focus ~ label,
  .field input:not(:placeholder-shown) ~ label,
  .field input:-webkit-autofill ~ label,
  .field input:autofill ~ label,
  .field.float label{top:7px;font-size:11px;letter-spacing:.03em}
  /* keep browser-autofilled fields on-theme (no yellow/white box, label stays floated) */
  .field input:-webkit-autofill,
  .field input:-webkit-autofill:hover,
  .field input:-webkit-autofill:focus{
    -webkit-text-fill-color:var(--text);
    -webkit-box-shadow:0 0 0 1000px var(--input-bg) inset;
    caret-color:var(--text);
    transition:background-color 9999s ease 0s, border-color .18s, box-shadow .18s;
  }

  .peek{position:absolute;right:8px;top:9px;width:34px;height:34px;border:0;background:transparent;
    color:var(--muted);cursor:pointer;border-radius:9px;display:grid;place-items:center}
  .peek:hover{color:var(--text)}

  .row-forgot{display:flex;justify-content:flex-end;margin-top:8px}
  .link{background:none;border:0;padding:0;color:var(--muted);font-size:12.5px;cursor:pointer;text-decoration:none}
  .link:hover{color:var(--text)}

  /* ---------- date-of-birth calendar (premium, theme-aware) ---------- */
  .dob-field input{cursor:pointer;padding-right:42px}
  .dob-ic{position:absolute;right:13px;top:17px;width:18px;height:18px;color:var(--muted);pointer-events:none}
  .cal{
    position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:50;padding:12px;border-radius:16px;
    background:color-mix(in srgb,var(--bg1) 93%,transparent);border:1px solid var(--card-brd);
    backdrop-filter:blur(26px) saturate(1.4);-webkit-backdrop-filter:blur(26px) saturate(1.4);
    box-shadow:0 26px 64px -22px rgba(0,0,0,.62),inset 0 1px 0 rgba(255,255,255,.08);
    opacity:0;transform:translateY(-6px) scale(.985);transform-origin:top center;pointer-events:none;
    transition:opacity .16s ease,transform .16s ease;
  }
  .cal.show{opacity:1;transform:none;pointer-events:auto}
  .cal-head{display:flex;align-items:center;gap:4px;margin-bottom:8px}
  .cal-title{flex:1;text-align:left;background:none;border:0;cursor:pointer;color:#fff;
    font-size:14px;font-weight:600;letter-spacing:-.01em;padding:6px 8px;border-radius:9px;transition:background .15s}
  .cal-title:not(:disabled):hover{background:var(--input-bg)}
  .cal-title:disabled{cursor:default}
  html.light .cal-title{color:var(--text)}
  .cal-nav{width:32px;height:32px;flex:none;display:grid;place-items:center;border:0;border-radius:9px;cursor:pointer;
    background:transparent;color:var(--muted);transition:background .15s,color .15s}
  .cal-nav:hover:not(:disabled){background:var(--input-bg);color:var(--text)}
  .cal-nav:disabled{opacity:.3;cursor:default}
  .cal-nav svg{width:17px;height:17px}
  .cal-wd{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
  .cal-wd span{text-align:center;font-size:10.5px;color:var(--muted);padding:4px 0;font-weight:500;letter-spacing:.02em}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-grid.years,.cal-grid.months{grid-template-columns:repeat(3,1fr);gap:6px}
  .cal-cell{height:38px;border:0;background:transparent;color:#fff;cursor:pointer;border-radius:10px;
    font-size:13px;font-variant-numeric:tabular-nums;display:grid;place-items:center;transition:background .12s,color .12s}
  .cal-grid.years .cal-cell,.cal-grid.months .cal-cell{height:46px;font-size:14px}
  .cal-cell:hover:not(:disabled):not(.sel){background:var(--input-bg)}
  .cal-cell.out{color:rgba(255,255,255,.42)}
  .cal-cell.today:not(.sel){box-shadow:inset 0 0 0 1px var(--ring)}
  .cal-cell.sel{background:#fff;color:#0a0a0b;font-weight:600}
  .cal-cell:disabled{opacity:.25;cursor:default}
  html.light .cal-cell{color:var(--text)}
  html.light .cal-cell.out{color:var(--muted)}
  html.light .cal-cell.sel{background:#0a0a0b;color:#fff}
  .cal-foot{display:flex;justify-content:space-between;margin-top:8px;padding-top:9px;border-top:1px solid var(--card-brd)}
  .cal-foot button{background:none;border:0;cursor:pointer;color:var(--muted);font-size:12.5px;font-weight:500;
    padding:4px 8px;border-radius:8px;transition:color .15s,background .15s}
  .cal-foot button:hover{color:var(--text);background:var(--input-bg)}

  /* ---------- message box ---------- */
  .msg{display:none;margin-top:14px;padding:10px 12px;border-radius:11px;font-size:13px;line-height:1.45;
    border:1px solid transparent}
  .msg.show{display:block}
  .msg.err{color:var(--err);background:color-mix(in srgb,var(--err) 10%,transparent);border-color:color-mix(in srgb,var(--err) 30%,transparent)}
  .msg.ok{color:var(--text);background:var(--input-bg);border-color:var(--card-brd)}
  .msg a{color:var(--text);font-weight:600}

  /* ---------- submit button + states ---------- */
  .submit{margin-top:16px;width:100%;height:50px;border:0;border-radius:13px;cursor:pointer;position:relative;
    background:var(--text);color:var(--bg0);font-size:15px;font-weight:600;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;transition:transform .1s,opacity .2s,background .25s}
  .submit:hover{opacity:.93}.submit:active{transform:scale(.99)}
  .submit:disabled{cursor:default;opacity:1}
  .s-label{display:flex;align-items:center;gap:8px}
  .s-spin,.s-check{display:none}
  .s-spin{width:20px;height:20px;border:2.5px solid color-mix(in srgb,var(--bg0) 22%,transparent);
    border-top-color:var(--bg0);border-radius:50%;animation:spin .7s linear infinite}
  .submit.loading .s-label{display:none}.submit.loading .s-spin{display:block}
  .submit.done{background:var(--ok);color:#fff}
  .submit.done .s-label,.submit.done .s-spin{display:none}.submit.done .s-check{display:flex}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- google + footer ---------- */
  .or{display:flex;align-items:center;gap:12px;margin:15px 0;color:var(--muted);font-size:12px}
  .or::before,.or::after{content:"";height:1px;flex:1;background:var(--card-brd)}
  .google{width:100%;height:48px;border-radius:13px;cursor:pointer;font-size:14px;color:var(--text);
    background:var(--input-bg);border:1px solid var(--card-brd);display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s}
  .google:hover{border-color:var(--ring)}
  .foot{margin:16px 0 2px;text-align:center;color:var(--muted);font-size:13px}
  .foot a{color:var(--text);text-decoration:none;font-weight:600;cursor:pointer}
  .demo{margin-top:12px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:.03em;opacity:.8}

  @media (prefers-reduced-motion:reduce){.card{transition:none}.s-spin{animation:none}}
</style>
</head>
<body>
  <h2 class="sr-only">Sign in to Research Assistant. Switch between sign in, sign up, and password reset within one card.</h2>

  <div id="bg"></div>
  <div class="vignette"></div>

  <button class="theme" id="themeBtn" aria-label="Switch theme">
    <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></svg>
  </button>

  <main class="card" id="card">
    <div class="brand">
      <span class="logomark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg></span>
      <h1>Research Assistant</h1>
    </div>
    <p class="sub" id="sub">Sign in to continue.</p>

    <form id="form" novalidate>
      <!-- email or username (login, forgot) -->
      <div class="field" data-modes="login forgot">
        <input id="userid" type="text" placeholder=" " autocomplete="username" autofocus />
        <label for="userid">Email or username</label>
      </div>

      <!-- username (signup) -->
      <div class="field" data-modes="signup">
        <input id="username" type="text" placeholder=" " autocomplete="username" />
        <label for="username">Username</label>
      </div>

      <!-- email (signup) -->
      <div class="field" data-modes="signup">
        <input id="email" type="email" placeholder=" " autocomplete="email" />
        <label for="email">Email</label>
      </div>

      <!-- date of birth (signup, forgot) — custom calendar, see JS -->
      <div class="field dob-field" id="dobField" data-modes="signup forgot">
        <input id="dob" type="text" placeholder=" " autocomplete="bday" readonly aria-haspopup="dialog" />
        <label for="dob">Date of birth</label>
        <svg class="dob-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
      </div>

      <!-- password (login, signup) -->
      <div class="field has-peek" data-modes="login signup">
        <input id="password" type="password" placeholder=" " autocomplete="current-password" />
        <label for="password">Password</label>
        <button class="peek" type="button" tabindex="-1" aria-label="Show password" data-target="password">
          <svg class="eye" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eyeoff hidden" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18M10.6 10.7a3 3 0 0 0 4.2 4.2M9.9 5.2A10 10 0 0 1 22 12a17 17 0 0 1-2.2 3M6.6 6.7A17 17 0 0 0 2 12s3.5 7 10 7a10 10 0 0 0 3.4-.6"/></svg>
        </button>
      </div>

      <!-- confirm (signup) -->
      <div class="field has-peek" data-modes="signup">
        <input id="confirm" type="password" placeholder=" " autocomplete="new-password" />
        <label for="confirm">Confirm password</label>
        <button class="peek" type="button" tabindex="-1" aria-label="Show password" data-target="confirm">
          <svg class="eye" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eyeoff hidden" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18M10.6 10.7a3 3 0 0 0 4.2 4.2M9.9 5.2A10 10 0 0 1 22 12a17 17 0 0 1-2.2 3M6.6 6.7A17 17 0 0 0 2 12s3.5 7 10 7a10 10 0 0 0 3.4-.6"/></svg>
        </button>
      </div>

      <!-- forgot link (login) -->
      <div class="row-forgot" data-modes="login">
        <button type="button" class="link" id="forgotLink">Forgot?</button>
      </div>

      <div class="msg" id="msg" role="alert" aria-live="polite"></div>

      <button class="submit" id="submit" type="submit">
        <span class="s-label"><span id="submitLabel">Sign in</span>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
        <span class="s-spin" aria-hidden="true"></span>
        <span class="s-check" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>
        </span>
      </button>

      <!-- google block (login, signup; only when configured) -->
      <div data-modes="login signup" data-requires="google" id="googleBlock">
        <div class="or">or</div>
        <button class="google" id="googleBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
          <span id="googleLabel">Continue with Google</span>
        </button>
      </div>

      <p class="foot" id="foot"></p>
      <p class="demo hidden" id="demoNote">Preview · no backend connected — submissions are simulated.</p>
    </form>
  </main>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);

  /* ----- validation primitives (mirror the server) ----- */
  const USER_RE  = /^[A-Za-z0-9._@-]{3,64}$/;
  const EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
  function ageFromDob(s){
    const d = new Date(s); if (isNaN(d)) return -1;
    const t = new Date(); let a = t.getFullYear() - d.getFullYear();
    const m = t.getMonth() - d.getMonth();
    if (m < 0 || (m === 0 && t.getDate() < d.getDate())) a--;
    return a;
  }

  const fields = {
    userid:$('userid'), username:$('username'), email:$('email'),
    dob:$('dob'), password:$('password'), confirm:$('confirm')
  };
  const form=$('form'), card=$('card'), msg=$('msg'), foot=$('foot'),
        sub=$('sub'), submit=$('submit'), submitLabel=$('submitLabel'),
        googleLabel=$('googleLabel');

  let MODE = 'login';
  const CFG = { auth:true, signup:true, google:true };
  let DEMO = false;

  /* ----- messages ----- */
  function showMsg(html, kind){ msg.innerHTML = html; msg.className = 'msg show ' + (kind||'ok'); }
  function clearMsg(){ msg.className = 'msg'; msg.innerHTML = ''; }

  /* ----- submit button states ----- */
  function setSubmit(state){            // 'idle' | 'loading' | 'done'
    submit.classList.toggle('loading', state==='loading');
    submit.classList.toggle('done',    state==='done');
    submit.disabled = (state!=='idle');
    card.classList.toggle('authing', state==='loading');
  }

  /* ----- mode switching (no page reload) ----- */
  const SUBS = { login:'Sign in to continue.', signup:'Create your account.', forgot:'Reset your password.' };
  function setMode(m){
    MODE = m;
    document.querySelectorAll('[data-modes]').forEach(el=>{
      let show = el.getAttribute('data-modes').split(' ').includes(m);
      if (el.dataset.requires === 'google' && !CFG.google) show = false;
      el.classList.toggle('hidden', !show);
    });
    submitLabel.textContent = m==='login' ? 'Sign in' : m==='signup' ? 'Create account' : 'Send reset link';
    googleLabel.textContent = m==='signup' ? 'Sign up with Google' : 'Continue with Google';
    sub.textContent = SUBS[m];
    setFooter(m);
    clearMsg(); setSubmit('idle'); syncFloats();
    const first = document.querySelector('.field:not(.hidden) input');
    if (first) first.focus();
  }
  function setFooter(m){
    if (m==='login'){
      if (!CFG.signup){ foot.classList.add('hidden'); foot.innerHTML=''; return; }
      foot.classList.remove('hidden');
      foot.innerHTML = 'New here? <a data-go="signup">Sign up</a>';
    } else if (m==='signup'){
      foot.classList.remove('hidden');
      foot.innerHTML = 'Already have an account? <a data-go="login">Sign in</a>';
    } else {
      foot.classList.remove('hidden');
      foot.innerHTML = '<a data-go="login">← Back to sign in</a>';
    }
  }

  /* footer + forgot navigation */
  document.addEventListener('click', (e)=>{
    const go = e.target.closest('[data-go]');
    if (go){ e.preventDefault(); setMode(go.dataset.go); }
  });
  $('forgotLink').addEventListener('click', ()=> setMode('forgot'));

  /* ----- floating labels: value-driven so typed, programmatic AND browser-autofilled
           values all float the label (fixes the password label overlapping its dots) ----- */
  function syncFloat(inp){
    if (!inp) return; const f = inp.closest('.field'); if (!f) return;
    f.classList.toggle('float', !!inp.value || inp.type === 'date');
  }
  function syncFloats(){ Object.keys(fields).forEach((k)=> syncFloat(fields[k])); }
  Object.keys(fields).forEach((k)=>{ const i = fields[k];
    if (i){ i.addEventListener('input', ()=> syncFloat(i)); i.addEventListener('change', ()=> syncFloat(i)); } });

  /* ----- custom date-of-birth calendar (premium, theme-aware; value stays ISO yyyy-mm-dd) ----- */
  (function(){
    const input = fields.dob, field = $('dobField');
    const MON  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const MON3 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const WD   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const CH_L = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';
    const CH_R = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
    const FOOT = '<div class="cal-foot"><button type="button" data-act="clear">Clear</button><button type="button" data-act="today">Today</button></div>';
    const today = new Date(); today.setHours(0,0,0,0);
    const cal = document.createElement('div');
    cal.className = 'cal'; cal.setAttribute('role','dialog'); cal.setAttribute('aria-label','Choose date of birth');
    field.appendChild(cal);

    let selected = null;
    let view = new Date(today.getFullYear()-20, today.getMonth(), 1); // a sensible starting point for a birthdate
    let mode = 'years';                                               // pick order: year → month → day
    let yearBase = view.getFullYear() - (view.getFullYear()%12);

    const iso  = (d)=> d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const same = (a,b)=> !!a && !!b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();

    function head(title, up, prevAct, nextAct, nextOff){
      return '<div class="cal-head">'
           +   '<button type="button" class="cal-title"'+(up?' data-act="'+up+'"':' disabled')+'>'+title+'</button>'
           +   '<button type="button" class="cal-nav" data-act="'+prevAct+'" aria-label="Previous">'+CH_L+'</button>'
           +   '<button type="button" class="cal-nav" data-act="'+nextAct+'" aria-label="Next"'+(nextOff?' disabled':'')+'>'+CH_R+'</button>'
           + '</div>';
    }
    function yearsHTML(){
      let cells='';
      for(let i=0;i<12;i++){
        const y=yearBase+i, sel=selected&&selected.getFullYear()===y;
        cells+='<button type="button" class="cal-cell'+(sel?' sel':'')+(y===today.getFullYear()?' today':'')+'" data-y="'+y+'"'+(y>today.getFullYear()?' disabled':'')+'>'+y+'</button>';
      }
      return head(yearBase+' – '+(yearBase+11), '', 'pdec', 'ndec', yearBase+12>today.getFullYear())
           + '<div class="cal-grid years">'+cells+'</div>' + FOOT;
    }
    function monthsHTML(){
      const y=view.getFullYear();
      let cells='';
      for(let m=0;m<12;m++){
        const dis = y>today.getFullYear() || (y===today.getFullYear() && m>today.getMonth());
        const sel = selected && selected.getFullYear()===y && selected.getMonth()===m;
        const cur = y===today.getFullYear() && m===today.getMonth();
        cells+='<button type="button" class="cal-cell'+(sel?' sel':'')+(cur?' today':'')+'" data-m="'+m+'"'+(dis?' disabled':'')+'>'+MON3[m]+'</button>';
      }
      return head(String(y), 'years', 'prevY', 'nextY', y>=today.getFullYear())
           + '<div class="cal-grid months">'+cells+'</div>' + FOOT;
    }
    function daysHTML(){
      const y=view.getFullYear(), m=view.getMonth(), first=new Date(y,m,1).getDay();
      let cells='';
      for(let i=0;i<42;i++){
        const d=new Date(y,m,1-first+i); d.setHours(0,0,0,0);
        const cls=['cal-cell'];
        if(d.getMonth()!==m) cls.push('out');
        if(same(d,today))    cls.push('today');
        if(same(d,selected)) cls.push('sel');
        cells+='<button type="button" class="'+cls.join(' ')+'" data-d="'+iso(d)+'"'+(d>today?' disabled':'')+'>'+d.getDate()+'</button>';
      }
      const nextOff = y>today.getFullYear() || (y===today.getFullYear() && m>=today.getMonth());
      return head(MON[m]+' '+y, 'months', 'prev', 'next', nextOff)
           + '<div class="cal-wd">'+WD.map(w=>'<span>'+w+'</span>').join('')+'</div>'
           + '<div class="cal-grid">'+cells+'</div>' + FOOT;
    }
    function render(){ cal.innerHTML = mode==='years' ? yearsHTML() : mode==='months' ? monthsHTML() : daysHTML(); }

    function open(){
      if(cal.classList.contains('show')) return;
      mode='years';                                                  // always start at the year picker
      if(selected) view=new Date(selected.getFullYear(), selected.getMonth(), 1);
      yearBase=view.getFullYear()-(view.getFullYear()%12);
      render(); cal.classList.add('show');
    }
    function close(){ cal.classList.remove('show'); mode='years'; syncFloat(input); }
    function pick(d){ selected=new Date(d.getFullYear(),d.getMonth(),d.getDate()); input.value=iso(selected); close(); }

    input.addEventListener('focus', open);
    input.addEventListener('click', open);
    input.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); }
      else if(e.key==='Escape'){ close(); }
    });

    cal.addEventListener('click', (e)=>{
      const b=e.target.closest('button'); if(!b || b.disabled) return;
      if(b.dataset.d){ pick(new Date(b.dataset.d+'T00:00:00')); return; }
      if(b.dataset.y!=null){ view=new Date(+b.dataset.y, view.getMonth(), 1); mode='months'; render(); return; }
      if(b.dataset.m!=null){ view=new Date(view.getFullYear(), +b.dataset.m, 1); mode='days'; render(); return; }
      switch(b.dataset.act){
        case 'years':  mode='years'; yearBase=view.getFullYear()-(view.getFullYear()%12); render(); break;
        case 'months': mode='months'; render(); break;
        case 'prev':   view=new Date(view.getFullYear(), view.getMonth()-1, 1); render(); break;
        case 'next':   view=new Date(view.getFullYear(), view.getMonth()+1, 1); render(); break;
        case 'prevY':  view=new Date(view.getFullYear()-1, view.getMonth(), 1); render(); break;
        case 'nextY':  view=new Date(view.getFullYear()+1, view.getMonth(), 1); render(); break;
        case 'pdec':   yearBase-=12; render(); break;
        case 'ndec':   yearBase+=12; render(); break;
        case 'clear':  selected=null; input.value=''; close(); break;
        case 'today':  pick(today); break;
      }
    });

    document.addEventListener('mousedown', (e)=>{
      if(cal.classList.contains('show') && !field.contains(e.target)) close();
    });
    document.addEventListener('keydown', (e)=>{
      if(e.key==='Escape' && cal.classList.contains('show')) close();
    });

    // reflect any pre-existing value (e.g. browser back-navigation)
    if(input.value){ const d=new Date(input.value); if(!isNaN(d)) selected=new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
  })();

  /* ----- password peek toggles ----- */
  document.querySelectorAll('.peek').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const inp = $(btn.dataset.target);
      const reveal = inp.type==='password';
      inp.type = reveal ? 'text' : 'password';
      btn.setAttribute('aria-label', reveal ? 'Hide password' : 'Show password');
      btn.querySelector('.eye').classList.toggle('hidden', reveal);
      btn.querySelector('.eyeoff').classList.toggle('hidden', !reveal);
    });
  });

  /* ----- per-mode validation ----- */
  function validate(){
    if (MODE==='login'){
      if (!fields.userid.value.trim() || !fields.password.value)
        return 'Enter your email/username and password.';
    } else if (MODE==='signup'){
      const u = fields.username.value.trim();
      if (!USER_RE.test(u))  return 'Username must be 3–64 characters (letters, digits, . _ - @).';
      if (!EMAIL_RE.test(fields.email.value.trim())) return 'Enter a valid email address.';
      const dob = fields.dob.value;
      if (!dob) return 'Enter your date of birth.';
      const age = ageFromDob(dob);
      if (age < 0) return 'Enter a valid date of birth.';
      if (new Date(dob) > new Date()) return 'Date of birth can’t be in the future.';
      if (age < 13) return 'You must be at least 13 years old.';
      if (fields.password.value.length < 6) return 'Password must be at least 6 characters.';
      if (fields.confirm.value !== fields.password.value) return 'Passwords don’t match.';
    } else { // forgot
      if (!fields.userid.value.trim()) return 'Enter your email or username.';
      if (!fields.dob.value)           return 'Enter your date of birth.';
    }
    return null;
  }

  /* ----- API helper ----- */
  async function api(url, body){
    const res = await fetch(url, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    let data = {}; try { data = await res.json(); } catch(_) {}
    data._status = res.status; data._rate = (res.status === 429);
    return data;
  }
  const wait = (ms)=> new Promise(r=>setTimeout(r, ms));

  /* ----- submit ----- */
  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const err = validate();
    if (err){ showMsg(err, 'err'); return; }
    clearMsg(); setSubmit('loading');

    if (DEMO){                                  // standalone preview, no server
      await wait(850);
      if (MODE==='forgot'){
        setSubmit('idle');
        showMsg('If an account matches, a reset link has been sent. <a href="#">Reset your password →</a>', 'ok');
      } else {
        setSubmit('done');
        await wait(800); setSubmit('idle');
        showMsg(MODE==='signup' ? 'Account created (demo).' : 'Signed in (demo).', 'ok');
      }
      return;
    }

    try{
      if (MODE==='login'){
        const r = await api('/api/login', { user_id:fields.userid.value.trim(), password:fields.password.value });
        if (r.ok){ setSubmit('done'); setTimeout(()=> location.href='/', 750); }
        else fail(r, 'Invalid email/username or password.');
      } else if (MODE==='signup'){
        const r = await api('/api/signup', {
          user_id:fields.username.value.trim(), password:fields.password.value,
          email:fields.email.value.trim(), date_of_birth:fields.dob.value
        });
        if (r.ok){ setSubmit('done'); setTimeout(()=> location.href='/', 750); }
        else fail(r, 'Could not create your account.');
      } else { // forgot — always generic (anti-enumeration)
        const r = await api('/api/forgot-password', {
          identifier:fields.userid.value.trim(), date_of_birth:fields.dob.value
        });
        setSubmit('idle');
        if (r.reset_url){
          showMsg('Account matched. <a href="'+r.reset_url+'">Reset your password →</a>', 'ok');
        } else {
          showMsg(r.message || 'If an account matches, a reset link has been sent.', 'ok');
        }
      }
    } catch(_){
      setSubmit('idle');
      showMsg('Something went wrong. Please try again.', 'err');
    }
  });
  function fail(r, fallback){
    setSubmit('idle');
    if (r._rate){ showMsg('Too many attempts — please wait a minute.', 'err'); return; }
    showMsg(r.error || fallback, 'err');
  }

  /* ----- Google ----- */
  $('googleBtn').addEventListener('click', ()=>{
    if (DEMO){ showMsg('Demo mode — this would redirect to Google sign-in.', 'ok'); return; }
    location.href = '/auth/google/login';
  });

  /* ----- ?error= mapping (from failed Google redirects / rate limits) ----- */
  const ERR = {
    google:'Google sign-in didn’t complete. Please try again.',
    google_email:'Your Google account email isn’t verified.',
    google_off:'Google sign-in isn’t configured on this server.',
    rate:'Too many attempts — please wait a minute.'
  };

  /* ----- theme (persisted; default dark) ----- */
  const THEME_KEY='ara-theme';
  const SUN='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const MOON='<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
  function applyTheme(light){
    document.documentElement.classList.toggle('light', light);
    $('themeIcon').innerHTML = light ? MOON : SUN;
    try{ localStorage.setItem(THEME_KEY, light?'light':'dark'); }catch(_){}
  }
  $('themeBtn').addEventListener('click', ()=>
    applyTheme(!document.documentElement.classList.contains('light')));

  /* ----- pointer state for the card tilt ----- */
  const pointer={x:0,y:0};
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* pointer parallax + 3D card tilt (calm under reduced motion) */
  window.addEventListener('pointermove', (e)=>{
    pointer.x=(e.clientX/window.innerWidth)*2-1;
    pointer.y=(e.clientY/window.innerHeight)*2-1;
    if(!reduced) card.style.transform=`perspective(900px) rotateY(${pointer.x*4}deg) rotateX(${-pointer.y*4}deg)`;
  });
  document.body.addEventListener('pointerleave', ()=>{ pointer.x=0; pointer.y=0; card.style.transform=''; });

  /* =========================================================
     Boot: theme → /api/me → mode → background
     ========================================================= */
  async function boot(){
    let saved=null; try{ saved=localStorage.getItem(THEME_KEY); }catch(_){}
    applyTheme(saved === 'light');           // default dark

    try{
      const res = await fetch('/api/me', { headers:{Accept:'application/json'} });
      if (!res.ok) throw 0;
      const d = await res.json();
      if (d && d.auth === false){ location.href='/'; return; }   // auth disabled → app is open
      if (d && d.user_id){ location.href='/'; return; }          // already signed in
      CFG.signup = !!(d && d.signup);
      CFG.google = !!(d && d.google);
    } catch(_){
      DEMO = true; CFG.signup = true; CFG.google = true;          // standalone preview
      $('demoNote').classList.remove('hidden');
    }

    setMode('login');
    // browser autofill populates values asynchronously after load — re-sync the labels a few times
    [120, 400, 900, 1600].forEach((ms)=> setTimeout(syncFloats, ms));

    const ee = new URLSearchParams(location.search).get('error');
    if (ee && ERR[ee]) showMsg(ERR[ee], 'err');
  }
  boot();
})();
</script>
</body>
